name: pulse360-ci

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  docs-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate required docs exist
        run: |
          test -f README.md
          test -f docs/security/mcp-security-assessment.md
          test -f docs/contracts/databricks-to-datacloud-contract.md
          test -f docs/contracts/datacloud-to-salesforce-agentforce-contract.md
          test -f docs/runbook/s4-ds-runbook.md
