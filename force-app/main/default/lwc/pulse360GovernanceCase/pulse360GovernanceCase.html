<template>
  <lightning-card title="Pulse360 Governance Case" icon-name="custom:custom63">
    <div class="slds-p-horizontal_small slds-p-bottom_small">
      <p class="slds-text-body_small">
        Side-by-side governance review with confidence and validity context.
      </p>
    </div>
    <div class="slds-grid slds-gutters slds-p-horizontal_small slds-p-bottom_small">
      <div class="slds-col">
        <div class="slds-box slds-theme_default">
          <h3 class="slds-text-title_caps">Candidate Left</h3>
          <p class="slds-truncate">{leftAccountName}</p>
          <p class="slds-text-color_weak">Source ID: {leftSourceAccountId}</p>
          <p class="slds-text-color_weak">Validity: {leftValidityScore}%</p>
        </div>
      </div>
      <div class="slds-col">
        <div class="slds-box slds-theme_default">
          <h3 class="slds-text-title_caps">Candidate Right</h3>
          <p class="slds-truncate">{rightAccountName}</p>
          <p class="slds-text-color_weak">Source ID: {rightSourceAccountId}</p>
          <p class="slds-text-color_weak">Validity: {rightValidityScore}%</p>
        </div>
      </div>
    </div>
    <div class="slds-p-horizontal_small slds-p-bottom_small">
      <lightning-badge label={pairConfidenceLabel}></lightning-badge>
      <span class="slds-m-left_small slds-text-color_weak">Run: {runId}</span>
    </div>
  </lightning-card>
</template>
